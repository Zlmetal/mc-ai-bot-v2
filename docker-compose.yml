services:
  mc-ai-bot:
    image: ghcr.io/zlmetal/mc-ai-bot-v2:main
    container_name: mc-ai-bot
    restart: unless-stopped
    ports:
      - "3800:3000"
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - MC_HOST=host.docker.internal
      - MC_PORT=25565
      - MC_AUTH=offline
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
