<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC AI Bot - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 13px; text-align: center; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; background: #0d0d1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: white; font-size: 15px; outline: none; }
    input:focus { border-color: #2563eb; }
    .btn { width: 100%; background: #2563eb; color: white; border: none; border-radius: 12px; padding: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #1d4ed8; }
    .error { color: #f44336; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎮 MC AI Bot</h1>
    <p class="subtitle">请登录以继续</p>
    <div class="error" id="error">用户名或密码错误</div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" placeholder="admin" autofocus>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="btn" id="btnLogin">登录</button>
  </div>
  <script>
    const $ = id => document.getElementById(id)
    
    async function login() {
      const username = $('username').value.trim()
      const password = $('password').value
      if (!username || !password) { $('error').textContent = '请输入用户名和密码'; $('error').style.display = 'block'; return }
      
      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const result = await resp.json()
        if (result.success) {
          window.location.href = '/'
        } else {
          $('error').textContent = result.message || '用户名或密码错误'
          $('error').style.display = 'block'
        }
      } catch (e) {
        $('error').textContent = '连接失败'
        $('error').style.display = 'block'
      }
    }
    
    $('btnLogin').addEventListener('click', login)
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login() })
    $('username').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('password').focus() })
  </script>
</body>
</html>
