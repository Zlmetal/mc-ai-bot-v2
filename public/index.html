<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MC AI Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部状态栏 */
    .status-bar {
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f44336;
    }
    .status-dot.online { background: #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-info { flex: 1; }
    .status-name { font-weight: 600; font-size: 15px; }
    .status-detail { font-size: 12px; color: #888; margin-top: 2px; }
    .settings-link { color: #888; text-decoration: none; font-size: 20px; }

    /* 聊天区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: #1e1e2e; border: 1px solid #333; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: none; color: #666; font-size: 12px; }
    .msg.ai.speaking { border-color: #4caf50; box-shadow: 0 0 12px rgba(76, 175, 80, 0.2); }

    /* 打字指示器 */
    .typing-indicator { display: none; align-self: flex-start; padding: 10px 14px; background: #1e1e2e; border: 1px solid #333; border-radius: 16px; border-bottom-left-radius: 4px; }
    .typing-indicator.active { display: flex; gap: 4px; }
    .typing-dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: typingBounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* 底部输入区 */
    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #1a1a2e;
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    /* 模式切换行 */
    .mode-switch {
      display: flex;
      gap: 8px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1e1e2e;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mode-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    /* 文字输入行 */
    .text-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .text-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      color: white;
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }
    .text-input:focus { border-color: #2563eb; }
    .text-input::placeholder { color: #555; }
    .btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-send { background: #2563eb; color: white; }
    .btn-send:active { transform: scale(0.9); }
    .btn-send:disabled { background: #333; color: #666; }

    /* 语音输入行 */
    .voice-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
    }
    .voice-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #444;
      background: #1e1e2e;
      color: #aaa;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .voice-btn:active { transform: scale(0.95); }
    .voice-btn.recording {
      background: #d32f2f;
      border-color: #f44336;
      color: white;
      animation: pulse-ring 1s infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
      100% { box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); }
    }
    .voice-hint {
      font-size: 13px;
      color: #666;
    }
    .voice-hint.recording { color: #f44336; }
  </style>
</head>
<body>
  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-info">
      <div class="status-name">MC AI Bot</div>
      <div class="status-detail" id="statusDetail">连接中...</div>
    </div>
    <a href="/settings.html" class="settings-link">⚙️</a>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-area" id="chatArea">
    <div class="msg system">与 AI 玩家对话</div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <!-- 模式切换 -->
    <div class="mode-switch">
      <button class="mode-btn active" id="modeText">⌨️ 文字</button>
      <button class="mode-btn" id="modeVoice">🎤 语音</button>
    </div>

    <!-- 文字输入模式 -->
    <div class="text-row" id="textRow">
      <textarea class="text-input" id="textInput" placeholder="说点什么..." rows="1"></textarea>
      <button class="btn btn-send" id="btnSend" disabled>↑</button>
    </div>

    <!-- 语音输入模式 -->
    <div class="voice-row" id="voiceRow" style="display: none;">
      <button class="voice-btn" id="btnVoice">🎤</button>
      <div class="voice-hint" id="voiceHint">按住说话</div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id)
    const chatArea = $('chatArea')
    const typingIndicator = $('typingIndicator')

    // ========== 模式切换 ==========
    let currentMode = 'text'

    $('modeText').addEventListener('click', () => {
      currentMode = 'text'
      $('modeText').classList.add('active')
      $('modeVoice').classList.remove('active')
      $('textRow').style.display = 'flex'
      $('voiceRow').style.display = 'none'
    })

    $('modeVoice').addEventListener('click', () => {
      currentMode = 'voice'
      $('modeVoice').classList.add('active')
      $('modeText').classList.remove('active')
      $('textRow').style.display = 'none'
      $('voiceRow').style.display = 'flex'
    })

    // ========== WebSocket 连接 ==========
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
    let ws = null
    let audioQueue = []
    let isPlayingAudio = false

    function connect() {
      ws = new WebSocket(`${protocol}//${location.host}`)
      ws.onopen = () => {
        $('statusDot').classList.add('online')
        $('statusDetail').textContent = '已连接'
      }
      ws.onclose = () => {
        $('statusDot').classList.remove('online')
        $('statusDetail').textContent = '连接断开，重连中...'
        setTimeout(connect, 3000)
      }
      ws.onerror = (err) => {
        console.error('[WS] 错误:', err)
      }
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data)
        handleMessage(data)
      }
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'status':
          if (data.data?.mindcraft_connected) {
            $('statusDot').classList.add('online')
            $('statusDetail').textContent = '已连接 MindCraft'
          } else {
            $('statusDot').classList.remove('online')
            $('statusDetail').textContent = '等待 MindCraft...'
          }
          break
        case 'bot-message':
          addMessage('ai', data.text)
          hideTyping()
          autoTTS(data.text)
          break
        case 'bot-output':
          addMessage('ai', data.text)
          hideTyping()
          autoTTS(data.text)
          break
      }
    }

    // ========== TTS ==========
    async function autoTTS(text) {
      try {
        const resp = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        })
        const result = await resp.json()
        if (result.success && result.audioUrl) {
          audioQueue.push(result.audioUrl)
          playNextAudio()
        }
      } catch (e) { /* ignore */ }
    }

    async function playNextAudio() {
      if (isPlayingAudio || audioQueue.length === 0) return
      isPlayingAudio = true
      const url = audioQueue.shift()

      const msgs = chatArea.querySelectorAll('.msg.ai')
      const lastMsg = msgs[msgs.length - 1]
      if (lastMsg) lastMsg.classList.add('speaking')

      const audio = new Audio(url)
      audio.onended = () => {
        if (lastMsg) lastMsg.classList.remove('speaking')
        isPlayingAudio = false
        playNextAudio()
      }
      audio.onerror = () => {
        isPlayingAudio = false
        playNextAudio()
      }
      try { await audio.play() } catch (e) { isPlayingAudio = false }
    }

    // ========== 聊天消息 ==========
    function addMessage(role, text) {
      const msg = document.createElement('div')
      msg.className = `msg ${role}`
      msg.textContent = text
      chatArea.insertBefore(msg, typingIndicator)
      chatArea.scrollTop = chatArea.scrollHeight
    }

    function showTyping() {
      typingIndicator.classList.add('active')
      chatArea.scrollTop = chatArea.scrollHeight
    }
    function hideTyping() {
      typingIndicator.classList.remove('active')
    }

    // ========== 发送消息 ==========
    function sendMessage(text) {
      if (!text || !ws || ws.readyState !== 1) return
      addMessage('user', text)
      ws.send(JSON.stringify({ type: 'chat', text }))
      showTyping()
    }

    // 文字模式发送
    $('textInput').addEventListener('input', () => {
      $('btnSend').disabled = !$('textInput').value.trim()
      $('textInput').style.height = 'auto'
      $('textInput').style.height = Math.min($('textInput').scrollHeight, 100) + 'px'
    })

    $('textInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        const text = $('textInput').value.trim()
        if (text) {
          sendMessage(text)
          $('textInput').value = ''
          $('textInput').style.height = 'auto'
          $('btnSend').disabled = true
        }
      }
    })

    $('btnSend').addEventListener('click', () => {
      const text = $('textInput').value.trim()
      if (text) {
        sendMessage(text)
        $('textInput').value = ''
        $('textInput').style.height = 'auto'
        $('btnSend').disabled = true
      }
    })

    // ========== 语音模式 ==========
    let recognition = null
    let isRecording = false

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition
      if (!SR) {
        $('modeVoice').style.display = 'none'
        return
      }
      recognition = new SR()
      recognition.lang = 'zh-CN'
      recognition.continuous = false
      recognition.interimResults = true

      recognition.onstart = () => {
        isRecording = true
        $('voiceBtn').classList.add('recording')
        $('voiceHint').textContent = '正在听...'
        $('voiceHint').classList.add('recording')
      }

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1]
        const transcript = result[0].transcript
        if (result.isFinal) {
          stopRecording()
          if (transcript.trim()) sendMessage(transcript)
        }
      }

      recognition.onerror = () => stopRecording()
      recognition.onend = () => stopRecording()
    }

    function startRecording() {
      if (!recognition || isRecording) return
      try { recognition.start() } catch (e) {}
    }

    function stopRecording() {
      if (!recognition || !isRecording) return
      isRecording = false
      $('voiceBtn').classList.remove('recording')
      $('voiceHint').textContent = '按住说话'
      $('voiceHint').classList.remove('recording')
      try { recognition.stop() } catch (e) {}
    }

    $('voiceBtn').addEventListener('mousedown', () => {
      if (isPlayingAudio) { audioQueue = []; isPlayingAudio = false }
      startRecording()
    })
    $('voiceBtn').addEventListener('mouseup', stopRecording)
    $('voiceBtn').addEventListener('mouseleave', stopRecording)
    $('voiceBtn').addEventListener('touchstart', (e) => { e.preventDefault(); startRecording() })
    $('voiceBtn').addEventListener('touchend', (e) => { e.preventDefault(); stopRecording() })

    // ========== 启动 ==========
    initSpeechRecognition()
    connect()
  </script>
</body>
</html>
