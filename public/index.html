<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MC AI Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .status-bar { padding: 12px 16px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; }
    .status-dot.online { background: #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-info { flex: 1; }
    .status-name { font-weight: 600; font-size: 15px; }
    .status-detail { font-size: 12px; color: #888; margin-top: 2px; }
    .settings-link { color: #888; text-decoration: none; font-size: 20px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: #1e1e2e; border: 1px solid #333; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: none; color: #666; font-size: 12px; }
    .msg.ai.speaking { border-color: #4caf50; box-shadow: 0 0 12px rgba(76, 175, 80, 0.2); }
    .typing-indicator { display: none; align-self: flex-start; padding: 10px 14px; background: #1e1e2e; border: 1px solid #333; border-radius: 16px; border-bottom-left-radius: 4px; }
    .typing-indicator.active { display: flex; gap: 4px; }
    .typing-dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: typingBounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .input-area { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: #1a1a2e; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    .mode-switch { display: flex; gap: 8px; }
    .mode-btn { flex: 1; padding: 8px 0; border: 1px solid #333; border-radius: 8px; background: #1e1e2e; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .mode-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    .text-row { display: flex; gap: 10px; align-items: flex-end; }
    .text-input { flex: 1; background: #0d0d1a; border: 1px solid #333; border-radius: 20px; padding: 10px 16px; color: white; font-size: 15px; outline: none; resize: none; max-height: 100px; font-family: inherit; }
    .text-input:focus { border-color: #2563eb; }
    .text-input::placeholder { color: #555; }
    .btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
    .btn-send { background: #2563eb; color: white; }
    .btn-send:active { transform: scale(0.9); }
    .btn-send:disabled { background: #333; color: #666; }
    .voice-row { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px 0; }
    .voice-btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #444; background: #1e1e2e; color: #aaa; font-size: 32px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .voice-btn:active { transform: scale(0.95); }
    .voice-btn.recording { background: #d32f2f; border-color: #f44336; color: white; animation: pulse-ring 1s infinite; }
    .voice-btn.in-call { background: #d32f2f; border-color: #f44336; color: white; animation: pulse-ring 1.5s infinite; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); } }
    .voice-hint { font-size: 13px; color: #666; }
    .voice-hint.recording { color: #f44336; }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-info">
      <div class="status-name">MC AI Bot</div>
      <div class="status-detail" id="statusDetail">连接中...</div>
    </div>
    <a href="/settings.html" class="settings-link">⚙️</a>
    <a href="#" class="settings-link" id="btnLogout" title="退出登录">🚪</a>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="msg system">与 AI 玩家对话</div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="mode-switch">
      <button class="mode-btn active" id="modeText">⌨️ 文字</button>
      <button class="mode-btn" id="modeVoice">🎤 语音</button>
    </div>
    <div class="text-row" id="textRow">
      <textarea class="text-input" id="textInput" placeholder="说点什么..." rows="1"></textarea>
      <button class="btn btn-send" id="btnSend" disabled>↑</button>
    </div>
    <div class="voice-row" id="voiceRow" style="display: none;">
      <div style="display: flex; gap: 16px; align-items: center;">
        <button class="voice-btn" id="btnVoice" title="按住说话">🎤</button>
        <button class="voice-btn" id="btnPhone" title="实时通话" style="background: #1b5e20; border-color: #4caf50; font-size: 28px;">📞</button>
      </div>
      <div class="voice-hint" id="voiceHint">按住说话 | 📞 实时通话</div>
    </div>
  </div>
  <script>
    const $ = id => document.getElementById(id)
    const chatArea = $('chatArea')
    const typingIndicator = $('typingIndicator')
    let currentMode = 'text'

    // ========== 模式切换 ==========
    $('modeText').addEventListener('click', () => {
      currentMode = 'text'
      $('modeText').classList.add('active')
      $('modeVoice').classList.remove('active')
      $('textRow').style.display = 'flex'
      $('voiceRow').style.display = 'none'
    })
    $('modeVoice').addEventListener('click', () => {
      currentMode = 'voice'
      $('modeVoice').classList.add('active')
      $('modeText').classList.remove('active')
      $('textRow').style.display = 'none'
      $('voiceRow').style.display = 'flex'
    })

    // ========== WebSocket ==========
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
    let ws = null
    let audioQueue = []
    let isPlayingAudio = false
    let reconnectAttempts = 0

    function connect() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return
      try {
        ws = new WebSocket(`${protocol}//${location.host}`)
      } catch (e) { scheduleReconnect(); return }

      ws.onopen = () => {
        reconnectAttempts = 0
        $('statusDot').classList.add('online')
        $('statusDetail').textContent = '已连接'
      }
      ws.onclose = () => {
        $('statusDot').classList.remove('online')
        $('statusDetail').textContent = '连接断开'
        scheduleReconnect()
      }
      ws.onerror = () => {}
      ws.onmessage = (event) => {
        try { handleMessage(JSON.parse(event.data)) } catch (e) {}
      }
    }

    function scheduleReconnect() {
      reconnectAttempts++
      const delay = Math.min(3000 * reconnectAttempts, 30000)
      $('statusDetail').textContent = `${Math.round(delay/1000)}秒后重连...`
      setTimeout(connect, delay)
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'status':
          if (data.data?.mindcraft_connected) {
            $('statusDot').classList.add('online')
            const agent = data.data.agents?.[0]
            $('statusDetail').textContent = agent?.in_game ? '游戏中' : '已连接'
          }
          break
        case 'text':
          addMessage('ai', data.text)
          hideTyping()
          break
        case 'bot-message':
          addMessage('ai', data.text)
          hideTyping()
          autoTTS(data.text)
          break
        case 'audio':
          if (data.audioUrl) { audioQueue.push(data.audioUrl); playNextAudio() }
          break
        case 'stop_audio':
          audioQueue = []
          document.querySelectorAll('.msg.ai.speaking').forEach(el => el.classList.remove('speaking'))
          break
      }
    }

    // ========== TTS ==========
    async function autoTTS(text) {
      try {
        const resp = await fetch('/api/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) })
        const result = await resp.json()
        if (result.success && result.audioUrl) { audioQueue.push(result.audioUrl); playNextAudio() }
      } catch (e) {}
    }

    async function playNextAudio() {
      if (isPlayingAudio || audioQueue.length === 0) return
      isPlayingAudio = true
      const url = audioQueue.shift()
      const msgs = chatArea.querySelectorAll('.msg.ai')
      const lastMsg = msgs[msgs.length - 1]
      if (lastMsg) lastMsg.classList.add('speaking')
      const audio = new Audio(url)
      audio.onended = () => { if (lastMsg) lastMsg.classList.remove('speaking'); isPlayingAudio = false; playNextAudio() }
      audio.onerror = () => { isPlayingAudio = false; playNextAudio() }
      try { await audio.play() } catch (e) { isPlayingAudio = false }
    }

    // ========== 聊天 ==========
    function addMessage(role, text) {
      const msg = document.createElement('div')
      msg.className = `msg ${role}`
      msg.textContent = text
      chatArea.insertBefore(msg, typingIndicator)
      chatArea.scrollTop = chatArea.scrollHeight
    }
    function showTyping() { typingIndicator.classList.add('active'); chatArea.scrollTop = chatArea.scrollHeight }
    function hideTyping() { typingIndicator.classList.remove('active') }

    function sendMessage(text) {
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return
      addMessage('user', text)
      ws.send(JSON.stringify({ type: 'chat', text }))
      showTyping()
    }

    $('textInput').addEventListener('input', () => {
      $('btnSend').disabled = !$('textInput').value.trim()
      $('textInput').style.height = 'auto'
      $('textInput').style.height = Math.min($('textInput').scrollHeight, 100) + 'px'
    })
    $('textInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        const text = $('textInput').value.trim()
        if (text) { sendMessage(text); $('textInput').value = ''; $('textInput').style.height = 'auto'; $('btnSend').disabled = true }
      }
    })
    $('btnSend').addEventListener('click', () => {
      const text = $('textInput').value.trim()
      if (text) { sendMessage(text); $('textInput').value = ''; $('textInput').style.height = 'auto'; $('btnSend').disabled = true }
    })

    // ========== 语音输入 ==========
    let mediaRecorder = null
    let audioChunks = []
    let isRecording = false
    let useServerSTT = false  // 是否使用服务端 Whisper
    let browserRecognition = null  // 浏览器内置语音识别

    async function initVoice() {
      // 检测是否支持 MediaRecorder（需要 HTTPS）
      if (location.protocol === 'https:' && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' })
          mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data) }
          mediaRecorder.onstop = async () => {
            $('voiceHint').textContent = '识别中...'
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' })
            audioChunks = []
            if (audioBlob.size < 1000) { $('voiceHint').textContent = '按住说话'; return }
            try {
              const resp = await fetch('/api/stt', { method: 'POST', headers: { 'Content-Type': 'audio/webm' }, body: audioBlob })
              const result = await resp.json()
              if (result.success && result.text) { sendMessage(result.text) }
              else { addMessage('system', '识别失败: ' + (result.message || '未识别到内容')) }
            } catch (e) { addMessage('system', '识别出错') }
            $('voiceHint').textContent = '按住说话'
          }
          useServerSTT = true
          console.log('[Voice] ✅ HTTPS 模式 - 服务端 Whisper STT')
          return
        } catch (e) {
          console.warn('[Voice] MediaRecorder 不可用，降级到 Web Speech API')
        }
      }

      // 降级：使用浏览器内置语音识别（HTTP 环境可用）
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition
      if (SR) {
        browserRecognition = new SR()
        browserRecognition.lang = 'zh-CN'
        browserRecognition.continuous = false
        browserRecognition.interimResults = false
        browserRecognition.onstart = () => {
          isRecording = true
          $('btnVoice').classList.add('recording')
          $('voiceHint').textContent = '正在听...'
          $('voiceHint').classList.add('recording')
        }
        browserRecognition.onresult = (event) => {
          const result = event.results[event.results.length - 1]
          if (result.isFinal && result[0].transcript.trim()) {
            sendMessage(result[0].transcript)
          }
        }
        browserRecognition.onerror = (e) => {
          console.error('[Voice] 错误:', e.error)
          if (e.error === 'not-allowed') {
            $('voiceHint').textContent = '请允许麦克风权限'
          }
        }
        browserRecognition.onend = () => { stopRecording() }
        console.log('[Voice] ✅ HTTP 模式 - 浏览器内置语音识别')
        return
      }

      // 都不支持
      console.warn('[Voice] 无可用语音识别方案')
      $('voiceHint').textContent = '语音不可用'
    }

    function startRecording() {
      if (isRecording) return
      if (useServerSTT && mediaRecorder) {
        isRecording = true
        audioChunks = []
        mediaRecorder.start(100)
        $('btnVoice').classList.add('recording')
        $('voiceHint').textContent = '正在录音...'
        $('voiceHint').classList.add('recording')
      } else if (browserRecognition) {
        try { browserRecognition.start() } catch (e) {}
      }
    }

    function stopRecording() {
      if (!isRecording) return
      isRecording = false
      if (useServerSTT && mediaRecorder) {
        mediaRecorder.stop()
      } else if (browserRecognition) {
        try { browserRecognition.stop() } catch (e) {}
      }
      $('btnVoice').classList.remove('recording')
      $('voiceHint').textContent = '按住说话'
      $('voiceHint').classList.remove('recording')
    }

    $('btnVoice').addEventListener('mousedown', () => { if (isPlayingAudio) { audioQueue = []; isPlayingAudio = false } startRecording() })
    $('btnVoice').addEventListener('mouseup', stopRecording)
    $('btnVoice').addEventListener('mouseleave', stopRecording)
    $('btnVoice').addEventListener('touchstart', (e) => { e.preventDefault(); startRecording() })
    $('btnVoice').addEventListener('touchend', (e) => { e.preventDefault(); stopRecording() })

    // ========== 启动 ==========
    initVoice()
    connect()

    // 退出登录
    $('btnLogout').addEventListener('click', async (e) => {
      e.preventDefault()
      await fetch('/api/logout', { method: 'POST' })
      window.location.href = '/login.html'
    })

    // ========== 实时通话模式 ==========
    let isInCall = false
    let callAudioContext = null
    let callAnalyser = null
    let callMediaRecorder = null
    let callChunks = []
    let callIsSpeaking = false
    let callSilenceTimer = null
    let callAnimFrame = null
    const SILENCE_THRESHOLD = 0.015  // 静音阈值
    const SILENCE_DURATION = 1200   // 静音多久算说完一句话（毫秒）
    const MIN_SPEECH_DURATION = 500 // 最短语音时长（毫秒）
    let callSpeechStartTime = 0

    $('btnPhone').addEventListener('click', () => {
      if (isInCall) {
        stopCall()
      } else {
        startCall()
      }
    })

    async function startCall() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
        
        // 设置 VAD
        callAudioContext = new AudioContext()
        const source = callAudioContext.createMediaStreamSource(stream)
        callAnalyser = callAudioContext.createAnalyser()
        callAnalyser.fftSize = 512
        source.connect(callAnalyser)

        // 设置录音
        callMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' })
        callMediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) callChunks.push(e.data) }
        callMediaRecorder.onstop = async () => {
          const blob = new Blob(callChunks, { type: 'audio/webm' })
          callChunks = []
          if (blob.size < 1000 || !isInCall) return
          // 发送到 STT
          try {
            const resp = await fetch('/api/stt', { method: 'POST', headers: { 'Content-Type': 'audio/webm' }, body: blob })
            const result = await resp.json()
            if (result.success && result.text && isInCall) {
              sendMessage(result.text)
            }
          } catch (e) {}
          // 识别说完后继续监听
          if (isInCall) {
            setTimeout(() => { if (isInCall) callMediaRecorder.start(100) }, 200)
          }
        }

        isInCall = true
        $('btnPhone').classList.add('in-call')
        $('btnPhone').textContent = '📵'
        $('voiceHint').textContent = '通话中... 说话自动识别'
        addMessage('system', '📞 实时通话已开启')

        // 开始录音和 VAD 监听
        callMediaRecorder.start(100)
        startVAD()

      } catch (e) {
        addMessage('system', '麦克风权限获取失败')
      }
    }

    function stopCall() {
      isInCall = false
      $('btnPhone').classList.remove('in-call')
      $('btnPhone').textContent = '📞'
      $('voiceHint').textContent = '按住说话 | 📞 实时通话'
      addMessage('system', '📞 实时通话已结束')

      if (callMediaRecorder && callMediaRecorder.state === 'recording') {
        callMediaRecorder.stop()
      }
      if (callAnimFrame) cancelAnimationFrame(callAnimFrame)
      if (callAudioContext) callAudioContext.close()
      callAudioContext = null
      callAnalyser = null
      callIsSpeaking = false
      if (callSilenceTimer) clearTimeout(callSilenceTimer)
    }

    function startVAD() {
      const dataArray = new Uint8Array(callAnalyser.frequencyBinCount)

      function checkVolume() {
        if (!isInCall || !callAnalyser) return

        callAnalyser.getByteFrequencyData(dataArray)
        let sum = 0
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i]
        const avg = sum / dataArray.length / 255  // 0~1

        if (avg > SILENCE_THRESHOLD) {
          // 检测到声音
          if (!callIsSpeaking) {
            callIsSpeaking = true
            callSpeechStartTime = Date.now()
            $('voiceHint').textContent = '🔴 正在听你说话...'
          }
          // 重置静音计时器
          if (callSilenceTimer) clearTimeout(callSilenceTimer)
          callSilenceTimer = null
        } else {
          // 静音
          if (callIsSpeaking && !callSilenceTimer) {
            callSilenceTimer = setTimeout(() => {
              // 静音足够久，认为说完了
              const duration = Date.now() - callSpeechStartTime
              if (duration > MIN_SPEECH_DURATION && callMediaRecorder.state === 'recording') {
                callIsSpeaking = false
                $('voiceHint').textContent = '⏳ 识别中...'
                callMediaRecorder.stop()  // 触发 onstop -> STT
              } else {
                callIsSpeaking = false
                callSilenceTimer = null
              }
            }, SILENCE_DURATION)
          }
        }

        callAnimFrame = requestAnimationFrame(checkVolume)
      }

      checkVolume()
    }
  </script>
</body>
</html>
