<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MC AI Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .status-bar {
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f44336;
    }
    .status-dot.online { background: #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-info { flex: 1; }
    .status-name { font-weight: 600; font-size: 15px; }
    .status-detail { font-size: 12px; color: #888; margin-top: 2px; }
    .settings-link { color: #888; text-decoration: none; font-size: 20px; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: #1e1e2e; border: 1px solid #333; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: none; color: #666; font-size: 12px; }
    .msg.ai.speaking { border-color: #4caf50; box-shadow: 0 0 12px rgba(76, 175, 80, 0.2); }

    .typing-indicator { display: none; align-self: flex-start; padding: 10px 14px; background: #1e1e2e; border: 1px solid #333; border-radius: 16px; border-bottom-left-radius: 4px; }
    .typing-indicator.active { display: flex; gap: 4px; }
    .typing-dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: typingBounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #1a1a2e;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .text-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      color: white;
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }
    .text-input:focus { border-color: #2563eb; }
    .text-input::placeholder { color: #555; }

    .btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-send { background: #2563eb; color: white; }
    .btn-send:active { transform: scale(0.9); }
    .btn-send:disabled { background: #333; color: #666; }

    .btn-voice {
      background: #1e1e2e;
      border: 2px solid #444;
      color: #888;
      font-size: 22px;
    }
    .btn-voice.recording {
      background: #d32f2f;
      border-color: #f44336;
      color: white;
      animation: pulse-ring 1s infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
      100% { box-shadow: 0 0 0 12px rgba(244, 67, 54, 0); }
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-info">
      <div class="status-name">MC AI Bot</div>
      <div class="status-detail" id="statusDetail">连接中...</div>
    </div>
    <a href="/settings.html" class="settings-link">⚙️</a>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg system">与 AI 玩家对话</div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-area">
    <button class="btn btn-voice" id="btnVoice" title="按住说话">🎤</button>
    <textarea class="text-input" id="textInput" placeholder="说点什么..." rows="1"></textarea>
    <button class="btn btn-send" id="btnSend" disabled>↑</button>
  </div>

  <script>
    const $ = id => document.getElementById(id)
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
    let ws = null
    let audioQueue = []
    let isPlayingAudio = false

    // WebSocket 连接
    function connect() {
      ws = new WebSocket(`${protocol}//${location.host}`)
      ws.onopen = () => {
        $('statusDot').classList.add('online')
        $('statusDetail').textContent = '已连接'
      }
      ws.onclose = () => {
        $('statusDot').classList.remove('online')
        $('statusDetail').textContent = '连接断开，重连中...'
        setTimeout(connect, 3000)
      }
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data)
        handleMessage(data)
      }
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'status':
          if (data.data?.mindcraft_connected) {
            $('statusDot').classList.add('online')
            $('statusDetail').textContent = '已连接 MindCraft'
          } else {
            $('statusDot').classList.remove('online')
            $('statusDetail').textContent = '等待 MindCraft...'
          }
          break
        case 'bot-message':
          addMessage('ai', data.text)
          hideTyping()
          // 自动 TTS
          autoTTS(data.text)
          break
        case 'bot-output':
          addMessage('ai', data.text)
          hideTyping()
          autoTTS(data.text)
          break
      }
    }

    // 自动 TTS
    async function autoTTS(text) {
      try {
        const resp = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        })
        const result = await resp.json()
        if (result.success && result.audioUrl) {
          audioQueue.push(result.audioUrl)
          playNextAudio()
        }
      } catch (e) { /* ignore */ }
    }

    async function playNextAudio() {
      if (isPlayingAudio || audioQueue.length === 0) return
      isPlayingAudio = true
      const url = audioQueue.shift()

      const msgs = chatArea.querySelectorAll('.msg.ai')
      const lastMsg = msgs[msgs.length - 1]
      if (lastMsg) lastMsg.classList.add('speaking')

      const audio = new Audio(url)
      audio.onended = () => {
        if (lastMsg) lastMsg.classList.remove('speaking')
        isPlayingAudio = false
        playNextAudio()
      }
      audio.onerror = () => {
        isPlayingAudio = false
        playNextAudio()
      }
      try { await audio.play() } catch (e) { isPlayingAudio = false }
    }

    // 消息显示
    function addMessage(role, text) {
      const msg = document.createElement('div')
      msg.className = `msg ${role}`
      msg.textContent = text
      chatArea.insertBefore(msg, typingIndicator)
      chatArea.scrollTop = chatArea.scrollHeight
    }

    function showTyping() { typingIndicator.classList.add('active'); chatArea.scrollTop = chatArea.scrollHeight }
    function hideTyping() { typingIndicator.classList.remove('active') }

    // 发送消息
    function sendMessage() {
      const text = textInput.value.trim()
      if (!text || !ws || ws.readyState !== 1) return
      addMessage('user', text)
      ws.send(JSON.stringify({ type: 'chat', text }))
      textInput.value = ''
      textInput.style.height = 'auto'
      btnSend.disabled = true
      showTyping()
    }

    // 语音输入
    let recognition = null
    let isRecording = false

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition
      if (!SR) { btnVoice.style.display = 'none'; return }
      recognition = new SR()
      recognition.lang = 'zh-CN'
      recognition.continuous = false
      recognition.interimResults = true

      recognition.onstart = () => { isRecording = true; btnVoice.classList.add('recording'); btnVoice.textContent = '⏹' }
      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1]
        textInput.value = result[0].transcript
        if (result.isFinal) { stopRecording(); if (result[0].transcript.trim()) sendMessage() }
      }
      recognition.onerror = () => stopRecording()
      recognition.onend = () => stopRecording()
    }

    function startRecording() { if (!recognition || isRecording) return; try { recognition.start() } catch (e) {} }
    function stopRecording() { if (!recognition || !isRecording) return; isRecording = false; btnVoice.classList.remove('recording'); btnVoice.textContent = '🎤'; try { recognition.stop() } catch (e) {} }

    // 事件绑定
    textInput.addEventListener('input', () => { btnSend.disabled = !textInput.value.trim(); textInput.style.height = 'auto'; textInput.style.height = Math.min(textInput.scrollHeight, 100) + 'px' })
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } })
    btnSend.addEventListener('click', sendMessage)
    btnVoice.addEventListener('mousedown', () => { if (isPlayingAudio) { audioQueue = []; isPlayingAudio = false } startRecording() })
    btnVoice.addEventListener('mouseup', stopRecording)
    btnVoice.addEventListener('mouseleave', stopRecording)
    btnVoice.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording() })
    btnVoice.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording() })

    initSpeechRecognition()
    connect()
  </script>
</body>
</html>
